<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneIndica Enterprise</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* Tech Milky Way Galaxy Background */
    background: url('https://images.unsplash.com/photo-1464802686167-b939a6910659?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    padding: 20px;
}

.card {
    /* Glassmorphism effect: semi-transparent white */
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.logo {
    width: 110px;
    margin-bottom: 15px;
}

h1 {
    font-size: 22px;
    margin-bottom: 5px;
    letter-spacing: 1px;
    color: #006479; /* Your Teal Heading */
}

.tagline {
    font-size: 13px;
    margin-bottom: 20px;
    color: #FC33FF; /* Your Pink Tagline */
    font-weight: 600;
}

.info {
    font-size: 14px;
    margin-bottom: 25px;
    color: #333;
    line-height: 1.4;
}

.buttons a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 12px 0;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    color: white;
    transition: 0.3s ease;
}

.call { background: #1abc9c; }
.email { background: #D14836; }
.whatsapp { background: #25D366; }
.facebook { background: #1877F2; }
.googlemap { background: #4285F4; }

.buttons a:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.footer {
    margin-top: 20px;
    font-size: 11px;
    color: #555;
    font-weight: 500;
}

</style>
</head>

<body>

<div class="card">
    <img src="Cropped_Image.png" class="logo" alt="Company Logo">

    <h1>OneIndica Enterprise</h1>
    <p class="tagline">The New Spirit of India</p>

    <p class="info">
        Beside Akanta Apan, Near Rajbhog Sweet, Hospital Road, Deuli, Belda, West Medinipur, 721424, W.B., India <br>
        <strong>GSTIN: 19AAJFO7371H1ZS.</strong>
    </p>

    <div class="buttons">
        <a href="tel:+919392173729" class="call">
            <i class="fa-solid fa-phone"></i> Call Now
        </a>

        <a href="mailto:oneindicaenterprise@gmail.com" class="email">
            <i class="fa-solid fa-envelope"></i> Send Email
        </a>

        <a href="https://wa.me/919392173729" class="whatsapp">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>

        <a href="https://www.facebook.com/profile.php?id=61579805344612" class="facebook">
            <i class="fa-brands fa-facebook-f"></i> Facebook
        </a>

        <a href="https://maps.google.com" class="googlemap">
            <i class="fa-solid fa-location-dot"></i> Google Map
        </a>
    </div>

    <div class="footer">
        © 2026 OneIndica Enterprise
    </div>
</div>

</body>
</html>
