      /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    /* --- THE FIX: WELCOME SCREEN --- */
    #welcome-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000000; /* Solid Black */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        /* Screen fades out at 9s */
        animation: fadeOutScreen 1s ease forwards 9s;
    }

    .welcome-text {
        color: #FC33FF; /* Your Pink */
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;
        line-height: 1.5;
        /* Text fades in immediately */
        opacity: 0;
        animation: fadeInText 2s ease forwards 0.5s;
    }

    .loading-container {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        margin-top: 30px;
        border-radius: 10px;
        overflow: hidden;
    }

    .loading-bar {
        width: 0%;
        height: 100%;
        background: #006479; /* Your Teal */
        /* Bar fills up over 8.5 seconds */
        animation: fillBar 8.5s linear forwards 0.5s;
    }

    /* Animations */
    @keyframes fadeInText {
        to { opacity: 1; transform: translateY(0); }
        from { opacity: 0; transform: translateY(20px); }
    }

    @keyframes fillBar {
        to { width: 100%; }
    }

    @keyframes fadeOutScreen {
        to { opacity: 0; visibility: hidden; }
    }

    /* --- MAIN CARD STYLES --- */

body {

    .card {

    .logo {
